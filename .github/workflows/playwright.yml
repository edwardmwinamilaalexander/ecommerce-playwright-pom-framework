name: Playwright Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      BASE_URL: ${{ vars.BASE_URL }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      PRACTICE_USER_EMAIL: ${{ secrets.PRACTICE_USER_EMAIL }}
      PRACTICE_USER_PASSWORD: ${{ secrets.PRACTICE_USER_PASSWORD }}
      STUDENT_USER_EMAIL: ${{ secrets.STUDENT_USER_EMAIL }}
      STUDENT_USER_PASSWORD: ${{ secrets.STUDENT_USER_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Install Allure CLI          # ← moved up, before tests run
        run: npm install -g allure-commandline --force

      - name: Run Playwright tests
        run: npx playwright test
        if: always()                      # ← removed, keep default behaviour here

      - name: Generate Allure HTML report # ← moved before uploads, runs even if tests fail
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Playwright HTML report
        if: always()                      # ← ensures upload even on test failure
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Allure results
        if: always()                      # ← ensures upload even on test failure
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 14

      - name: Upload Allure HTML report
        if: always()                      # ← ensures upload even on test failure
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 14